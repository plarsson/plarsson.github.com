<!doctype html>
<html lang="en">
    <head>
        <meta charset="utf-8" />
        <meta
            name="viewport"
            content="width=device-width, initial-scale=1, viewport-fit=cover"
        />
        <title>PLN</title>
        <style>
            :root {
                color-scheme: dark;
                --bg: #050506;
                --logo: #f4f1ea;
            }

            * {
                box-sizing: border-box;
            }

            html,
            body {
                margin: 0;
                width: 100%;
                min-height: 100%;
                background: var(--bg);
            }

            body {
                min-height: 100vh;
                min-height: 100svh;
                min-height: 100dvh;
                display: grid;
                place-items: center;
                overflow: hidden;
                background:
                    radial-gradient(
                        circle at 50% 48%,
                        rgba(255, 255, 255, 0.07),
                        transparent 28rem
                    ),
                    #050506;
            }

            .logo {
                display: block;
                width: min(76vw, 640px);
                max-width: 86vw;
                height: auto;
                color: var(--logo);
                overflow: visible;
                filter: drop-shadow(0 0 14px rgba(255, 255, 255, 0.07))
                    drop-shadow(0 22px 58px rgba(0, 0, 0, 0.65));
            }

            .part {
                fill: none;
                stroke: currentColor;
                stroke-width: 9;
                stroke-linecap: round;
                transform-box: fill-box;
                transform-origin: center;
                opacity: 0;
                animation: settle 1150ms cubic-bezier(0.18, 0.9, 0.22, 1)
                    forwards;
            }

            .p-stem {
                --x: -80px;
                --y: -42px;
                --r: -32deg;
                animation-delay: 80ms;
            }
            .p-arc {
                --x: 70px;
                --y: -52px;
                --r: 38deg;
                animation-delay: 180ms;
            }
            .l-stem {
                --x: -36px;
                --y: 76px;
                --r: 28deg;
                animation-delay: 280ms;
            }
            .n-arc {
                --x: 88px;
                --y: 68px;
                --r: -54deg;
                animation-delay: 380ms;
            }

            @keyframes settle {
                0% {
                    opacity: 0;
                    transform: translate(var(--x), var(--y)) rotate(var(--r))
                        scale(0.74);
                }
                62% {
                    opacity: 1;
                    transform: translate(0, 0) rotate(0deg) scale(1.045);
                }
                100% {
                    opacity: 1;
                    transform: translate(0, 0) rotate(0deg) scale(1);
                }
            }

            @media (max-width: 600px) {
                .logo {
                    width: 80vw;
                    max-width: 80vw;
                }
            }

            @media (prefers-reduced-motion: reduce) {
                .part {
                    animation: none;
                    opacity: 1;
                }
            }
        </style>
    </head>
    <body>
        <svg
            class="logo"
            xmlns="http://www.w3.org/2000/svg"
            viewBox="45 30 140 120"
            role="img"
            aria-label="PLN logo"
        >
            <g class="part p-stem">
                <line x1="60" y1="70" x2="60" y2="140" />
            </g>
            <g class="part p-arc">
                <path
                    d="M 75 70 C 86.529 70 93.737 86.666 87.971 100 C 85.295 106.188 80.351 110 75 110"
                />
            </g>
            <g class="part l-stem">
                <line x1="115" y1="40" x2="115" y2="110" />
            </g>
            <g class="part n-arc">
                <path
                    d="M 150.133 57.5 C 161.662 57.5 168.87 74.166 163.104 87.5 C 160.428 93.688 155.484 97.5 150.133 97.5"
                    transform="matrix(0, -1, 1, 0, 82.499674410407, 235.133162794796)"
                />
            </g>
        </svg>
    </body>
</html>
